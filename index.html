<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>—</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <style>
body {
  background-color: #333;
  padding: 20px;
}
input {
background:#333;
border: 0.5px solid white;
color: white;
padding: 5px;
}

/* Container with resizable dimensions */
.resizable-container {
width: 1280px;      /* Initial width */
height: 720px;      /* Initial height */
min-width: 320px;   /* Minimum width */
min-height: 180px;  /* Minimum height */
resize: both;       /* Allows horizontal and vertical resizing */
overflow: hidden;   /* Required for resize to work properly */
border: 1px solid #555;
padding-bottom: 15px; /* Gap at the bottom for easy mouse grab */
box-sizing: border-box;
}

/* Player occupies 100% of container width and height */
#player {
width: 100%;
height: 100%;
display: block;
border: none;
}

.links {
position: fixed;
right: 16px;
bottom: 12px;
}

a {
color: #666;
}

</style>
</head>
<body>
<input type="text" id="url" size="40" placeholder="Insert YouTube link here">
<br><br>
<!-- Wrapper container for resizing -->
<div class="resizable-container">
  <iframe id="player"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>
<br><br>

<div class="links">
   <a href="https://yt-channel-checker.vercel.app" target="_blank">channel checker</a>
</div>
<script>
  function extractVideoId(url) {
    const regex = /(?:youtube\.com.*v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
    const match = url.match(regex);
    return match ? match[1] : null;
  }

  document.getElementById("url").addEventListener("input", function () {
    const url = this.value.trim();
    const videoId = extractVideoId(url);

    if (videoId) {
      // Correct URL formatting for player embedding
      const embedUrl = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
      document.getElementById("player").src = embedUrl;
    }
  });
</script>
</body>
</html>
