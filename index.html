<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube No-Cookie Player</title>
  
  <style>
  
body {
  background-color: #333;
}

input {
  background:#333;
  border: 0.5px solid white;
  color: white;
  
}
</style>

</head>
<body>

<!-- Added 'autofocus' to select the input automatically when the page opens -->
<input type="text" id="url" size="40" autofocus>

<br><br>

<iframe id="player"
  width="640"
  height="360"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>

<script>
  function extractVideoId(url) {
    const regex = /(?:youtube\.com.*v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
    const match = url.match(regex);
    return match ? match[1] : null;
  }

  const inputElement = document.getElementById("url");

  inputElement.addEventListener("input", function () {
    const url = this.value.trim();
    const videoId = extractVideoId(url);

    if (videoId) {
      // Updated the URL format to point to the youtube-nocookie embed link
      const embedUrl = "https://www.youtube-nocookie.com/embed/" + videoId + "?autoplay=1";
      document.getElementById("player").src = embedUrl;
    }
  });

  // Captures any paste action on the page and routes it directly to the input box
  document.addEventListener("paste", function (e) {
    const pastedText = (e.clipboardData || window.clipboardData).getData("text");
    inputElement.value = pastedText;
    
    // Trigger the input event to automatically update the iframe
    inputElement.dispatchEvent(new Event('input'));
  });
</script>

</body>
</html>
