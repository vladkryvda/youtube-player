<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>•</title>
  <!-- Inline vector of white dot for ultra-minimalist favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2230%22 fill=%22%23ffffff%22/></svg>">
  <style>
/* Reset and global layout settings */
html, body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background-color: #121212;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  padding: 40px;
  box-sizing: border-box;
  cursor: default;
}

/* Styled URL Input */
input[type="text"] {
  background: #1e1e1e;
  border: 1px solid #333;
  border-radius: 8px;
  color: white;
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  width: 360px;
  box-sizing: border-box;
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: text;
}

input[type="text"]:focus {
  outline: none;
  border-color: #666;
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03);
}

input[type="text"]:disabled {
  border-color: #222;
  color: #555;
  background: #161616;
  cursor: not-allowed;
}

/* Modernized Resizable Container */
.resizable-container {
  position: relative;
  width: 1280px;      /* Default width */
  height: 720px;      /* Default height */
  min-width: 320px;   /* Min width */
  min-height: 180px;  /* Min height */
  border: 1px solid #2d2d2d;
  border-radius: 12px;
  box-sizing: border-box;
  overflow: hidden;   /* Keeps iframe and overlay within rounded borders */
  background: #181818;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
}

/* Player occupies 100% of container space */
#player {
  width: 100%;
  height: 100%;
  display: block;
  border: none;
}

/* Footer links */
.links {
  position: fixed;
  right: 24px;
  bottom: 18px;
}

a {
  color: #555;
  cursor: pointer;
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
}

a:hover {
  color: #888;
}

/* Center Form Layout inside container */
#form-overlay {
  display: flex;
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  background: #181818;
  overflow-y: auto;
}

.minimal-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  max-width: 540px;
  margin: 0 auto;
  box-sizing: border-box;
  padding: 30px;
  text-align: center;
}

.minimal-form h3 {
  margin: 0 0 10px 0;
  font-weight: 400;
  font-size: 18px;
  color: #ffffff;
  letter-spacing: -0.5px;
}

.minimal-form textarea {
  width: 100%;
  height: 80px; /* Reduced slightly to fit two boxes comfortably */
  background: #1e1e1e;
  border: 1px solid #333;
  border-radius: 8px;
  color: white;
  padding: 14px;
  box-sizing: border-box;
  resize: none;
  font-family: inherit;
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 4px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.minimal-form textarea:focus {
  outline: none;
  border-color: #666;
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03);
}

.minimal-form .counter {
  align-self: flex-end;
  font-size: 11px;
  color: #555;
  margin-bottom: 20px;
}

/* Soft modern button */
.minimal-btn {
  background: #ffffff;
  border: none;
  border-radius: 6px;
  color: #121212;
  padding: 10px 24px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.2s, opacity 0.2s;
  margin-top: 10px;
}

.minimal-btn:hover:not(:disabled) {
  background: #e5e5e5;
}

.minimal-btn:disabled {
  background: #252525;
  color: #555;
  cursor: not-allowed;
}

/* Inconspicuous Log Toggle Point */
#log-toggle {
  position: fixed;
  top: 20px;
  right: 24px;
  color: #444;
  text-decoration: none;
  font-size: 26px;
  cursor: pointer;
  user-select: none;
  z-index: 1001;
  transition: color 0.2s;
}

#log-toggle:hover {
  color: #888;
}

/* Modern Sleek Journal Panel */
#log-panel {
  position: fixed;
  top: 0;
  right: -400px;
  width: 400px;
  height: 100vh;
  background: #161616;
  border-left: 1px solid #252525;
  box-sizing: border-box;
  padding: 50px 24px 24px 24px;
  transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 1000;
  overflow-y: auto;
  color: #999;
  font-family: monospace;
  font-size: 12px;
  visibility: hidden;
}

#log-panel.open {
  right: 0;
  visibility: visible;
}

#log-panel h2 {
  margin-top: 0;
  font-weight: normal;
  font-size: 14px;
  color: #ffffff;
  letter-spacing: 1.5px;
  border-bottom: 1px solid #252525;
  padding-bottom: 12px;
}

/* Modern scrollbar for Journal */
#log-panel::-webkit-scrollbar {
  width: 5px;
}
#log-panel::-webkit-scrollbar-track {
  background: #161616;
}
#log-panel::-webkit-scrollbar-thumb {
  background: #2a2a2a;
  border-radius: 3px;
}
#log-panel::-webkit-scrollbar-thumb:hover {
  background: #3a3a3a;
}

.log-entry {
  border-bottom: 1px solid #222;
  padding: 16px 0;
}

.log-entry:last-child {
  border-bottom: none;
}

.log-entry-date {
  color: #555;
  font-size: 10px;
  margin-bottom: 6px;
}

.log-entry-url a {
  color: #444;
  word-break: break-all;
  font-size: 10px;
}

.log-entry-url a:hover {
  color: #777;
}

.log-entry-q {
  color: #666;
  margin-top: 10px;
  font-weight: bold;
}

.log-entry-a {
  color: #bbb;
  margin-bottom: 4px;
  padding-left: 10px;
  border-left: 1px solid #333;
  white-space: pre-wrap;
  line-height: 1.4;
}

.log-panel-actions {
  margin-top: 30px;
  display: flex;
  gap: 10px;
}

.log-panel-actions button {
  background: transparent;
  border: 1px solid #2a2a2a;
  border-radius: 4px;
  color: #666;
  font-size: 10px;
  cursor: pointer;
  padding: 6px 10px;
  font-family: inherit;
  transition: all 0.2s;
}

.log-panel-actions button:hover {
  border-color: #444;
  color: #aaa;
  background: #1c1c1c;
}

</style>
</head>
<body>

<a id="log-toggle" title="View Journal">•</a>

<div id="log-panel">
  <h2>JOURNAL</h2>
  <div id="log-list"></div>
  <div class="log-panel-actions">
    <button id="export-btn">Export to TXT</button>
    <button id="clear-btn">Clear History</button>
  </div>
</div>

<input type="text" id="url" size="40" placeholder="Insert YouTube link here">
<br><br>

<!-- Container for video/forms -->
<div class="resizable-container">
  <iframe id="player" style="display: none;"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
  <div id="form-overlay"></div>
</div>
<br><br>

<div class="links">
   <a href="https://yt-channel-checker.vercel.app" target="_blank">channel checker</a>
</div>

<script>
  // Minimum characters required for inputs
  const MIN_CHARS = 50;

  // State Management Variables
  let currentUrl = '';
  let currentVideoId = '';
  
  // New variables for two questions
  let currentIntentResult = '';
  let currentIntentReason = '';
  
  let nextUrl = '';
  let nextVideoId = '';
  let appState = 'idle'; // 'idle' | 'intent' | 'playing' | 'review'

  // Safe wrapper for localStorage
  const safeStorage = {
    getLogs() {
      try {
        const data = localStorage.getItem('yt_mindful_logs');
        const parsed = JSON.parse(data || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.warn("Storage access restricted.");
        return [];
      }
    },
    saveLogs(logs) {
      try {
        localStorage.setItem('yt_mindful_logs', JSON.stringify(logs));
      } catch (e) {
        console.warn("Could not save to local storage:", e);
      }
    },
    clearLogs() {
      try {
        localStorage.removeItem('yt_mindful_logs');
      } catch (e) {
        console.warn("Could not clear local storage:", e);
      }
    }
  };

  function extractVideoId(url) {
    if (!url) return null;
    const regex = /(?:youtube\.com.*v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
    const match = url.match(regex);
    return match ? match[1] : null;
  }

  // Deeply fault-tolerant HTML escaping
  function escapeHTML(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>'"]/g, 
      tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
  }

  // State Renderer
  function setAppState(state) {
    appState = state;
    const urlInput = document.getElementById("url");
    const player = document.getElementById("player");
    const overlay = document.getElementById("form-overlay");

    if (!urlInput || !player || !overlay) return;

    if (state === 'idle') {
      urlInput.disabled = false;
      urlInput.value = '';
      player.style.display = 'none';
      player.src = '';
      overlay.style.display = 'flex';
      overlay.innerHTML = `<div style="margin: auto; color: #444; font-size: 15px; letter-spacing: 0.5px;">Paste a YouTube link above to begin.</div>`;
    } 
    
    else if (state === 'intent') {
      urlInput.disabled = false; // Keep editable to let user cancel or change
      player.style.display = 'none';
      overlay.style.display = 'flex';
      
      // Two separate questions and textareas
      overlay.innerHTML = `
        <div class="minimal-form">
          <h3>What result do you want to get out of this?</h3>
          <textarea id="intent-result" placeholder="Explain your target results..."></textarea>
          <div class="counter" id="result-counter">0 / ${MIN_CHARS} chars</div>

          <h3 style="margin-top: 10px;">What do you need this for?</h3>
          <textarea id="intent-reason" placeholder="Explain your motivation or reason..."></textarea>
          <div class="counter" id="reason-counter">0 / ${MIN_CHARS} chars</div>

          <button id="intent-submit" class="minimal-btn" disabled>Proceed</button>
        </div>
      `;

      const txResult = document.getElementById("intent-result");
      const txReason = document.getElementById("intent-reason");
      const cntResult = document.getElementById("result-counter");
      const cntReason = document.getElementById("reason-counter");
      const btn = document.getElementById("intent-submit");

      if (txResult && txReason && btn) {
        txResult.focus();

        const validateInputs = () => {
          const lenRes = txResult.value.trim().length;
          const lenRea = txReason.value.trim().length;
          cntResult.textContent = `${lenRes} / ${MIN_CHARS} chars`;
          cntReason.textContent = `${lenRea} / ${MIN_CHARS} chars`;
          
          // Button is disabled if ANY of the fields is below MIN_CHARS
          btn.disabled = (lenRes < MIN_CHARS || lenRea < MIN_CHARS);
        };

        txResult.addEventListener("input", validateInputs);
        txReason.addEventListener("input", validateInputs);

        btn.addEventListener("click", function() {
          currentIntentResult = txResult.value.trim();
          currentIntentReason = txReason.value.trim();
          setAppState('playing');
        });
      }
    } 
    
    else if (state === 'playing') {
      overlay.style.display = 'none';
      player.style.display = 'block';
      player.src = "https://www.youtube.com/embed/" + currentVideoId + "?autoplay=1";
    } 
    
    else if (state === 'review') {
      urlInput.disabled = true; // Lock input specifically during reflection
      urlInput.value = '';
      player.style.display = 'none';
      player.src = '';
      overlay.style.display = 'flex';

      overlay.innerHTML = `
        <div class="minimal-form">
          <h3>What outcome did you get?</h3>
          <textarea id="review-text" style="height:110px;" placeholder="Describe the actual outcome or what you learned from watching..."></textarea>
          <div class="counter" id="review-counter">0 / ${MIN_CHARS} characters</div>
          <button id="review-submit" class="minimal-btn" disabled>Save & Unlock</button>
        </div>
      `;

      const tx = document.getElementById("review-text");
      const cnt = document.getElementById("review-counter");
      const btn = document.getElementById("review-submit");

      if (tx && cnt && btn) {
        tx.focus();
        tx.addEventListener("input", function() {
          const len = tx.value.trim().length;
          cnt.textContent = `${len} / ${MIN_CHARS} characters`;
          btn.disabled = len < MIN_CHARS;
        });

        btn.addEventListener("click", function() {
          // Saving both new variables instead of one
          saveLog(currentUrl, currentIntentResult, currentIntentReason, tx.value.trim());
          
          if (nextUrl && nextVideoId) {
            // Move to the next queued video
            currentUrl = nextUrl;
            currentVideoId = nextVideoId;
            nextUrl = '';
            nextVideoId = '';
            urlInput.value = currentUrl;
            setAppState('intent');
          } else {
            setAppState('idle');
          }
        });
      }
    }
  }

  // Handle URL changes / Erasing to trigger state machine
  const urlEl = document.getElementById("url");
  if (urlEl) {
    const handleUrlInput = function() {
      const val = urlEl.value.trim();

      if (val === '') {
        if (appState === 'playing') {
          // Erasing link triggers Review
          setAppState('review');
        } else if (appState === 'intent') {
          // Erasing during intent returns to idle
          setAppState('idle');
        }
        return;
      }

      const videoId = extractVideoId(val);
      if (!videoId) return;

      if (appState === 'idle' || appState === 'intent') {
        currentUrl = val;
        currentVideoId = videoId;
        setAppState('intent');
      } 
      else if (appState === 'playing') {
        if (videoId !== currentVideoId) {
          // Pasting a new video queues it and triggers review for the current one
          nextUrl = val;
          nextVideoId = videoId;
          setAppState('review');
        }
      }
    };

    ['input', 'change'].forEach(evt => {
      urlEl.addEventListener(evt, handleUrlInput);
    });
  }

  // Log Saving Mechanism updated with two intents
  function saveLog(url, intentResult, intentReason, review) {
    const logs = safeStorage.getLogs();
    const newEntry = {
      date: new Date().toISOString(),
      url: url,
      intentResult: intentResult,
      intentReason: intentReason,
      review: review
    };
    logs.push(newEntry);
    safeStorage.saveLogs(logs);
    renderLogs();
  }

  // Log Rendering updated for Journal formatting
  function renderLogs() {
    const logs = safeStorage.getLogs();
    const listContainer = document.getElementById('log-list');
    if (!listContainer) return;
    
    if (logs.length === 0) {
      listContainer.innerHTML = '<div style="color:#444; text-align:center; margin-top:40px;">Your journal is empty.</div>';
      return;
    }

    listContainer.innerHTML = logs.slice().reverse().map(entry => {
      if (!entry || typeof entry !== 'object') return '';
      
      const d = entry.date ? new Date(entry.date) : null;
      const dateStr = (d && !isNaN(d)) ? d.toLocaleString('en-US', { hour12: false }) : 'Unknown Date';
      const urlStr = entry.url ? escapeHTML(entry.url) : '#';
      
      // Checking both old "intent" and new variables for backwards compatibility with old records
      const resultStr = entry.intentResult ? escapeHTML(entry.intentResult) : (entry.intent ? escapeHTML(entry.intent) : 'No result entered');
      const reasonStr = entry.intentReason ? escapeHTML(entry.intentReason) : 'N/A (Old record)';
      const reviewStr = entry.review ? escapeHTML(entry.review) : 'No summary entered';

      return `
        <div class="log-entry">
          <div class="log-entry-date">${dateStr}</div>
          <div class="log-entry-url"><a href="${urlStr}" target="_blank">${urlStr}</a></div>
          
          <div class="log-entry-q">Q: What result do you want to get out of this?</div>
          <div class="log-entry-a">${resultStr}</div>
          
          <div class="log-entry-q">Q: What do you need this for?</div>
          <div class="log-entry-a">${reasonStr}</div>
          
          <div class="log-entry-q">Q: What outcome did you get?</div>
          <div class="log-entry-a">${reviewStr}</div>
        </div>
      `;
    }).join('');
  }

  // Export Journal to File
  const exportBtn = document.getElementById("export-btn");
  if (exportBtn) {
    exportBtn.addEventListener("click", function() {
      const logs = safeStorage.getLogs();
      if (logs.length === 0) return;

      let text = "MINDFUL YOUTUBE JOURNAL\n=======================\n\n";
      logs.forEach(entry => {
        if (!entry) return;
        const d = entry.date ? new Date(entry.date) : null;
        const dateStr = (d && !isNaN(d)) ? d.toLocaleString('en-US', { hour12: false }) : 'Unknown Date';
        
        text += `Date: ${dateStr}\n`;
        text += `URL: ${entry.url || 'N/A'}\n`;
        text += `Desired Result: ${entry.intentResult || entry.intent || 'N/A'}\n`;
        text += `Reason: ${entry.intentReason || 'N/A (Old record)'}\n`;
        text += `Actual Outcome: ${entry.review || 'N/A'}\n`;
        text += `--------------------------------------------------\n\n`;
      });

      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `youtube_mindful_journal_${new Date().toISOString().slice(0,10)}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  }

  // Clear Journal
  const clearBtn = document.getElementById("clear-btn");
  if (clearBtn) {
    clearBtn.addEventListener("click", function() {
      if (confirm("Are you sure you want to delete all entries from your history?")) {
        safeStorage.clearLogs();
        renderLogs();
      }
    });
  }

  // Toggle Log Panel View
  const logToggle = document.getElementById("log-toggle");
  const logPanel = document.getElementById("log-panel");

  if (logToggle && logPanel) {
    logToggle.addEventListener("click", function(e) {
      e.stopPropagation();
      logPanel.classList.toggle("open");
    });

    // Close Log Panel on outside click
    document.addEventListener("click", function(e) {
      if (!logPanel.contains(e.target) && e.target !== logToggle) {
        logPanel.classList.remove("open");
      }
    });
  }

  // Smooth Resizing Logic:
  const container = document.querySelector('.resizable-container');
  const player = document.getElementById('player');

  let isResizing = false;
  let startX, startY, startWidth, startHeight;

  document.addEventListener('mousedown', function (e) {
    if (!e.target) return;

    // Original resizing: allow drag-to-resize anywhere EXCEPT on explicit interactive elements
    const isInteractive = 
      e.target.tagName === 'INPUT' || 
      e.target.tagName === 'TEXTAREA' || 
      e.target.tagName === 'BUTTON' || 
      e.target.tagName === 'A' || 
      (e.target.closest && (
        e.target.closest('#player') || 
        e.target.closest('.links') ||
        e.target.closest('#log-panel') ||
        e.target.closest('#log-toggle')
      ));

    if (isInteractive) {
      return;
    }

    e.preventDefault();
    isResizing = true;
    if (player) player.style.pointerEvents = 'none'; // Smooth dragging without iframe interception

    startX = e.clientX;
    startY = e.clientY;
    startWidth = container.offsetWidth;
    startHeight = container.offsetHeight;

    document.addEventListener('mousemove', handleMouseMove);
    document.addEventListener('mouseup', handleMouseUp);
  });

  function handleMouseMove(e) {
    if (!isResizing || !container) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    let newWidth = startWidth + dx;
    let newHeight = startHeight + dy;

    newWidth = Math.max(320, newWidth);
    newHeight = Math.max(180, newHeight);

    container.style.width = newWidth + 'px';
    container.style.height = newHeight + 'px';
  }

  function handleMouseUp() {
    isResizing = false;
    if (player) player.style.pointerEvents = 'auto'; // Re-enable iframe mouse interactions
    document.removeEventListener('mousemove', handleMouseMove);
    document.removeEventListener('mouseup', handleMouseUp);
  }

  // Safe Initialize App sequence
  try {
    setAppState('idle');
    renderLogs();
  } catch (err) {
    console.error("Initialization error:", err);
  }
</script>
</body>
</html>
