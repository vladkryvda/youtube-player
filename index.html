<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>•</title>
  <!-- Inline vector of white dot for ultra-minimalist favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2230%22 fill=%22%23ffffff%22/></svg>">
  <style>
/* Background setup for the entire viewport */
html, body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background-color: #333;
}

body {
  padding: 20px;
  box-sizing: border-box;
  font-family: sans-serif;
  cursor: default;
  color: white;
}

input[type="text"] {
  background: #333;
  border: 0.5px solid white;
  color: white;
  padding: 5px;
  cursor: text;
}

input[type="text"]:disabled {
  border-color: #555;
  color: #777;
  cursor: not-allowed;
}

/* Container for player */
.resizable-container {
  position: relative;
  width: 1280px;      /* Default width */
  height: 720px;      /* Default height */
  min-width: 320px;   /* Min width */
  min-height: 180px;  /* Min height */
  border: 1px solid #555;
  box-sizing: border-box;
  overflow: hidden;   /* Prevents iframe overflow on scaling */
  background: #252525;
}

/* Player occupies 100% of container space */
#player {
  width: 100%;
  height: 100%;
  display: block;
  border: none;
}

.links {
  position: fixed;
  right: 16px;
  bottom: 12px;
}

a {
  color: #666;
  cursor: pointer;
  text-decoration: none;
}

a:hover {
  color: #888;
}

/* Forms layout inside the container */
#form-overlay {
  display: flex;
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  background: #252525;
}

.minimal-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  max-width: 600px;
  margin: 0 auto;
  box-sizing: border-box;
  padding: 20px;
  text-align: center;
}

.minimal-form h3 {
  margin: 0 0 20px 0;
  font-weight: normal;
  font-size: 18px;
  color: #eee;
}

.minimal-form textarea {
  width: 100%;
  height: 100px;
  background: #333;
  border: 0.5px solid white;
  color: white;
  padding: 10px;
  box-sizing: border-box;
  resize: none;
  font-family: sans-serif;
  margin-bottom: 10px;
}

.minimal-form textarea:focus {
  outline: none;
  border-color: #aaa;
}

.minimal-form .counter {
  align-self: flex-end;
  font-size: 11px;
  color: #777;
  margin-bottom: 15px;
}

.minimal-btn {
  background: transparent;
  border: 0.5px solid white;
  color: white;
  padding: 6px 16px;
  cursor: pointer;
  font-family: sans-serif;
  font-size: 13px;
  transition: all 0.2s;
}

.minimal-btn:hover:not(:disabled) {
  background: white;
  color: #333;
}

.minimal-btn:disabled {
  border-color: #555;
  color: #555;
  cursor: not-allowed;
}

/* Log Toggle Point */
#log-toggle {
  position: fixed;
  top: 15px;
  right: 20px;
  color: #555;
  text-decoration: none;
  font-size: 24px;
  cursor: pointer;
  user-select: none;
  z-index: 1001;
}

#log-toggle:hover {
  color: #888;
}

/* Log Panel Layout */
#log-panel {
  position: fixed;
  top: 0;
  right: -400px;
  width: 400px;
  height: 100vh;
  background: #222;
  border-left: 1px solid #444;
  box-sizing: border-box;
  padding: 40px 20px 20px 20px;
  transition: right 0.3s ease;
  z-index: 1000;
  overflow-y: auto;
  color: #ccc;
  font-family: monospace;
  font-size: 13px;
  visibility: hidden; /* Prevents clicks on hidden panel */
}

#log-panel.open {
  right: 0;
  visibility: visible; /* Allows interaction only when open */
}

#log-panel h2 {
  margin-top: 0;
  font-weight: normal;
  font-size: 16px;
  letter-spacing: 1px;
  border-bottom: 1px solid #444;
  padding-bottom: 10px;
}

.log-entry {
  border-bottom: 1px dashed #444;
  padding: 15px 0;
}

.log-entry:last-child {
  border-bottom: none;
}

.log-entry-date {
  color: #666;
  font-size: 11px;
  margin-bottom: 5px;
}

.log-entry-url a {
  color: #555;
  word-break: break-all;
  font-size: 11px;
}

.log-entry-url a:hover {
  color: #888;
}

.log-entry-q {
  color: #888;
  margin-top: 5px;
  font-weight: bold;
}

.log-entry-a {
  color: #bbb;
  margin-bottom: 5px;
  padding-left: 8px;
  border-left: 1px solid #444;
  white-space: pre-wrap;
}

.log-panel-actions {
  margin-top: 30px;
  display: flex;
  gap: 10px;
}

.log-panel-actions button {
  background: transparent;
  border: 0.5px solid #555;
  color: #777;
  font-size: 11px;
  cursor: pointer;
  padding: 4px 8px;
}

.log-panel-actions button:hover {
  border-color: #888;
  color: #aaa;
}

</style>
</head>
<body>

<a id="log-toggle" title="View Journal">•</a>

<div id="log-panel">
  <h2>JOURNAL</h2>
  <div id="log-list"></div>
  <div class="log-panel-actions">
    <button id="export-btn">Export to TXT</button>
    <button id="clear-btn">Clear History</button>
  </div>
</div>

<input type="text" id="url" size="40" placeholder="Insert YouTube link here">
<button id="finish-btn" class="minimal-btn" style="display: none; margin-left: 10px; padding: 4px 10px; font-size: 12px;">Finish & Reflect</button>
<br><br>

<!-- Container for video/forms -->
<div class="resizable-container">
  <iframe id="player" style="display: none;"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
  <div id="form-overlay"></div>
</div>
<br><br>

<div class="links">
   <a href="https://yt-channel-checker.vercel.app" target="_blank">channel checker</a>
</div>

<script>
  // Minimum characters required for inputs to reduce thoughtless browsing
  const MIN_CHARS = 50;

  // State Management Variables
  let currentUrl = '';
  let currentVideoId = '';
  let currentIntent = '';
  let appState = 'idle'; // 'idle' | 'intent' | 'playing' | 'review'

  // Safe wrapper for localStorage to prevent security exceptions in private modes
  const safeStorage = {
    getLogs() {
      try {
        const data = localStorage.getItem('yt_mindful_logs');
        const parsed = JSON.parse(data || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.warn("Storage access restricted. History will not be saved permanently.");
        return [];
      }
    },
    saveLogs(logs) {
      try {
        localStorage.setItem('yt_mindful_logs', JSON.stringify(logs));
      } catch (e) {
        console.warn("Could not save to local storage:", e);
      }
    },
    clearLogs() {
      try {
        localStorage.removeItem('yt_mindful_logs');
      } catch (e) {
        console.warn("Could not clear local storage:", e);
      }
    }
  };

  function extractVideoId(url) {
    if (!url) return null;
    const regex = /(?:youtube\.com.*v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
    const match = url.match(regex);
    return match ? match[1] : null;
  }

  // Deeply fault-tolerant HTML escaping
  function escapeHTML(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>'"]/g, 
      tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
  }

  // State Renderer
  function setAppState(state) {
    appState = state;
    const urlInput = document.getElementById("url");
    const finishBtn = document.getElementById("finish-btn");
    const player = document.getElementById("player");
    const overlay = document.getElementById("form-overlay");

    if (!urlInput || !finishBtn || !player || !overlay) return;

    if (state === 'idle') {
      urlInput.disabled = false;
      urlInput.value = '';
      finishBtn.style.display = 'none';
      player.style.display = 'none';
      player.src = '';
      overlay.style.display = 'flex';
      overlay.innerHTML = `<div style="margin: auto; color: #555;">Paste a YouTube link above to begin.</div>`;
    } 
    
    else if (state === 'intent') {
      urlInput.disabled = true;
      finishBtn.style.display = 'none';
      player.style.display = 'none';
      overlay.style.display = 'flex';
      
      overlay.innerHTML = `
        <div class="minimal-form">
          <h3>What outcome do you want to get?</h3>
          <textarea id="intent-text" placeholder="Write down your learning goal or why you want to watch this..."></textarea>
          <div class="counter" id="intent-counter">0 / ${MIN_CHARS} characters</div>
          <button id="intent-submit" class="minimal-btn" disabled>Proceed</button>
        </div>
      `;

      const tx = document.getElementById("intent-text");
      const cnt = document.getElementById("intent-counter");
      const btn = document.getElementById("intent-submit");

      if (tx && cnt && btn) {
        tx.focus();
        tx.addEventListener("input", function() {
          const len = tx.value.trim().length;
          cnt.textContent = `${len} / ${MIN_CHARS} characters`;
          btn.disabled = len < MIN_CHARS;
        });

        btn.addEventListener("click", function() {
          currentIntent = tx.value.trim();
          setAppState('playing');
        });
      }
    } 
    
    else if (state === 'playing') {
      overlay.style.display = 'none';
      player.style.display = 'block';
      player.src = "https://www.youtube.com/embed/" + currentVideoId + "?autoplay=1";
      finishBtn.style.display = 'inline-block';
    } 
    
    else if (state === 'review') {
      urlInput.disabled = true;
      finishBtn.style.display = 'none';
      player.style.display = 'none';
      player.src = '';
      overlay.style.display = 'flex';

      overlay.innerHTML = `
        <div class="minimal-form">
          <h3>What outcome did you get?</h3>
          <textarea id="review-text" placeholder="Summarize what you learned or what you got from this video..."></textarea>
          <div class="counter" id="review-counter">0 / ${MIN_CHARS} characters</div>
          <button id="review-submit" class="minimal-btn" disabled>Save & Unlock</button>
        </div>
      `;

      const tx = document.getElementById("review-text");
      const cnt = document.getElementById("review-counter");
      const btn = document.getElementById("review-submit");

      if (tx && cnt && btn) {
        tx.focus();
        tx.addEventListener("input", function() {
          const len = tx.value.trim().length;
          cnt.textContent = `${len} / ${MIN_CHARS} characters`;
          btn.disabled = len < MIN_CHARS;
        });

        btn.addEventListener("click", function() {
          saveLog(currentUrl, currentIntent, tx.value.trim());
          setAppState('idle');
        });
      }
    }
  }

  // Handle URL Paste/Input safely with multiple events
  const urlEl = document.getElementById("url");
  if (urlEl) {
    const handleUrlInput = function() {
      const url = urlEl.value.trim();
      const videoId = extractVideoId(url);

      if (videoId) {
        currentUrl = url;
        currentVideoId = videoId;
        setAppState('intent');
      }
    };

    ['input', 'change'].forEach(evt => {
      urlEl.addEventListener(evt, handleUrlInput);
    });
  }

  // Handle Finish Button click
  const finishBtnEl = document.getElementById("finish-btn");
  if (finishBtnEl) {
    finishBtnEl.addEventListener("click", function() {
      setAppState('review');
    });
  }

  // Log Saving Mechanism
  function saveLog(url, intent, review) {
    const logs = safeStorage.getLogs();
    const newEntry = {
      date: new Date().toISOString(),
      url: url,
      intent: intent,
      review: review
    };
    logs.push(newEntry);
    safeStorage.saveLogs(logs);
    renderLogs();
  }

  // Deeply fault-tolerant Log Rendering (cannot crash on incomplete/corrupted entries)
  function renderLogs() {
    const logs = safeStorage.getLogs();
    const listContainer = document.getElementById('log-list');
    if (!listContainer) return;
    
    if (logs.length === 0) {
      listContainer.innerHTML = '<div style="color:#555; text-align:center; margin-top:40px;">Your journal is empty.</div>';
      return;
    }

    listContainer.innerHTML = logs.slice().reverse().map(entry => {
      if (!entry || typeof entry !== 'object') return '';
      
      const d = entry.date ? new Date(entry.date) : null;
      const dateStr = (d && !isNaN(d)) ? d.toLocaleString('en-US', { hour12: false }) : 'Unknown Date';
      const urlStr = entry.url ? escapeHTML(entry.url) : '#';
      const intentStr = entry.intent ? escapeHTML(entry.intent) : 'No objective entered';
      const reviewStr = entry.review ? escapeHTML(entry.review) : 'No summary entered';

      return `
        <div class="log-entry">
          <div class="log-entry-date">${dateStr}</div>
          <div class="log-entry-url"><a href="${urlStr}" target="_blank">${urlStr}</a></div>
          <div class="log-entry-q">Desired outcome:</div>
          <div class="log-entry-a">${intentStr}</div>
          <div class="log-entry-q">Actual outcome:</div>
          <div class="log-entry-a">${reviewStr}</div>
        </div>
      `;
    }).join('');
  }

  // Export Journal to File
  const exportBtn = document.getElementById("export-btn");
  if (exportBtn) {
    exportBtn.addEventListener("click", function() {
      const logs = safeStorage.getLogs();
      if (logs.length === 0) return;

      let text = "MINDFUL YOUTUBE JOURNAL\n=======================\n\n";
      logs.forEach(entry => {
        if (!entry) return;
        const d = entry.date ? new Date(entry.date) : null;
        const dateStr = (d && !isNaN(d)) ? d.toLocaleString('en-US', { hour12: false }) : 'Unknown Date';
        text += `Date: ${dateStr}\n`;
        text += `URL: ${entry.url || 'N/A'}\n`;
        text += `Desired Outcome: ${entry.intent || 'N/A'}\n`;
        text += `Actual Outcome: ${entry.review || 'N/A'}\n`;
        text += `--------------------------------------------------\n\n`;
      });

      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `youtube_mindful_journal_${new Date().toISOString().slice(0,10)}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  }

  // Clear Journal
  const clearBtn = document.getElementById("clear-btn");
  if (clearBtn) {
    clearBtn.addEventListener("click", function() {
      if (confirm("Are you sure you want to delete all entries from your history?")) {
        safeStorage.clearLogs();
        renderLogs();
      }
    });
  }

  // Toggle Log Panel View
  const logToggle = document.getElementById("log-toggle");
  const logPanel = document.getElementById("log-panel");

  if (logToggle && logPanel) {
    logToggle.addEventListener("click", function(e) {
      e.stopPropagation();
      logPanel.classList.toggle("open");
    });

    // Close Log Panel on outside click
    document.addEventListener("click", function(e) {
      if (!logPanel.contains(e.target) && e.target !== logToggle) {
        logPanel.classList.remove("open");
      }
    });
  }

  // Smooth Resizing Logic:
  const container = document.querySelector('.resizable-container');
  const player = document.getElementById('player');

  let isResizing = false;
  let startX, startY, startWidth, startHeight;

  document.addEventListener('mousedown', function (e) {
    if (!e.target) return;

    // Ignore drag resizing when interacting with interactive form elements
    const isInteractive = 
      e.target.tagName === 'INPUT' || 
      e.target.tagName === 'TEXTAREA' || 
      e.target.tagName === 'BUTTON' || 
      e.target.tagName === 'A' || 
      (e.target.closest && (
        e.target.closest('#player') || 
        e.target.closest('.links') ||
        e.target.closest('#form-overlay') ||
        e.target.closest('#log-panel') ||
        e.target.closest('#log-toggle')
      ));

    if (isInteractive) {
      return;
    }

    e.preventDefault();
    isResizing = true;
    if (player) player.style.pointerEvents = 'none'; // Smooth dragging without iframe interception

    startX = e.clientX;
    startY = e.clientY;
    startWidth = container.offsetWidth;
    startHeight = container.offsetHeight;

    document.addEventListener('mousemove', handleMouseMove);
    document.addEventListener('mouseup', handleMouseUp);
  });

  function handleMouseMove(e) {
    if (!isResizing || !container) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    let newWidth = startWidth + dx;
    let newHeight = startHeight + dy;

    newWidth = Math.max(320, newWidth);
    newHeight = Math.max(180, newHeight);

    container.style.width = newWidth + 'px';
    container.style.height = newHeight + 'px';
  }

  function handleMouseUp() {
    isResizing = false;
    if (player) player.style.pointerEvents = 'auto'; // Re-enable iframe mouse interactions
    document.removeEventListener('mousemove', handleMouseMove);
    document.removeEventListener('mouseup', handleMouseUp);
  }

  // Safe Initialize App sequence
  try {
    setAppState('idle');
    renderLogs();
  } catch (err) {
    console.error("Initialization error:", err);
  }
</script>
</body>
</html>
