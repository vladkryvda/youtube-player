<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube No-Cookie Player</title>
  <!-- Виправлено підключення іконки -->
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <style>
    body {
      background-color: #333;
      font-family: sans-serif;
      color: white;
      padding: 20px;
    }

    input {
      background: #333;
      border: 1px solid white;
      color: white;
      padding: 8px;
      width: 100%;
      max-width: 620px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

<input type="text" id="url" placeholder="Вставте посилання на YouTube відео (або Shorts)...">
<br><br>

<iframe id="player"
  width="640"
  height="360"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>

<script>
  function extractVideoId(url) {
    const regex = /(?:youtube\.com.*v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
    const match = url.match(regex);
    return match ? match[1] : null;
  }

  document.getElementById("url").addEventListener("input", function () {
    const url = this.value.trim();
    const videoId = extractVideoId(url);

    if (videoId) {
      // Додано базову адресу для безкукисного плеєра
      const embedUrl = "https://www.youtube-nocookie.com/embed/" + videoId + "?autoplay=1";
      document.getElementById("player").src = embedUrl;
    }
  });
</script>
</body>
</html>
