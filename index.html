<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube No-Cookie Player</title>
  
  <style>
  
body {
  background-color: #333;
}

input {
  background:#333;
  border: 0.5px solid white;
  color: white;
  
}
</style>

</head>
<body>

<input type="text" id="url" size="40">

<br><br>

<iframe id="player"
  width="640"
  height="360"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>

<script>
  function extractVideoId(url) {
    const regex = /(?:youtube\.com.*v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
    const match = url.match(regex);
    return match ? match[1] : null;
  }

  document.getElementById("url").addEventListener("input", function () {
    const url = this.value.trim();
    const videoId = extractVideoId(url);

    if (videoId) {
      const embedUrl = " + videoId + "?autoplay=1";
      document.getElementById("player").src = embedUrl;
    }
  });

  // Automatically paste the last copied text when the input bar is clicked
  document.getElementById("url").addEventListener("click", async function () {
    try {
      const text = await navigator.clipboard.readText();
      this.value = text;
      // Dispatch the input event to trigger the player update logic above
      this.dispatchEvent(new Event('input'));
    } catch (err) {
      console.error("Failed to read clipboard: ", err);
    }
  });
</script>

</body>
</html>
